services:

  nginx:
    image: nginx:1.29.4-alpine
    ports:
      - "8081:80"
      - "8087:81"
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1; curl -f http://localhost:81/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager


  postgres:
    image: postgres:16.9-bullseye
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./services/database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"
      restart_policy:
        condition: on-failure


  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role == manager"
      restart_policy:
        condition: on-failure


  session-service:
    image: newberdi/do7:session-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      replicas: 1


  hotel-service:
    image: newberdi/do7:hotel-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotels_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      replicas: 1


  loyalty-service:
    image: newberdi/do7:loyalty-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: balances_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      replicas: 1


  payment-service:
    image: newberdi/do7:payment-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      replicas: 1


  report-service:
    image: newberdi/do7:report-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: statistics_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: guest
      RABBIT_MQ_PASSWORD: guest
      RABBIT_MQ_QUEUE_NAME: messagequeue
      RABBIT_MQ_EXCHANGE: messagequeue-exchange
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w \"%{http_code}\" http://localhost:8086/ | grep -E \"^(2|3|4)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - backend
    deploy:
      replicas: 1


  booking-service:
    image: newberdi/do7:booking-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservations_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: guest
      RABBIT_MQ_PASSWORD: guest
      RABBIT_MQ_QUEUE_NAME: messagequeue
      RABBIT_MQ_EXCHANGE: messagequeue-exchange
      HOTEL_SERVICE_HOST: hotel-service
      HOTEL_SERVICE_PORT: 8082
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: 8084
      LOYALTY_SERVICE_HOST: loyalty-service
      LOYALTY_SERVICE_PORT: 8085
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - backend
    deploy:
      replicas: 1


  gateway-service:
    image: newberdi/do7:gateway-service
    environment:
      SESSION_SERVICE_HOST: session-service
      SESSION_SERVICE_PORT: 8081
      HOTEL_SERVICE_HOST: hotel-service
      HOTEL_SERVICE_PORT: 8082
      BOOKING_SERVICE_HOST: booking-service
      BOOKING_SERVICE_PORT: 8083
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: 8084
      LOYALTY_SERVICE_HOST: loyalty-service
      LOYALTY_SERVICE_PORT: 8085
      REPORT_SERVICE_HOST: report-service
      REPORT_SERVICE_PORT: 8086
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w \"%{http_code}\" http://localhost:8087/ | grep -E \"^(2|3|4)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - backend
    deploy:
      replicas: 1


volumes:
  postgres-data:
  rabbitmq-data:

networks:
  backend:
    driver: overlay
    attachable: true

configs:
  nginx_conf:
    file: /home/vagrant/app/nginx.conf